<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPage — Headless</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400&family=Inter:wght@400;700&family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/core/style.css">
  <script type="module" src="/src/headless/fit-entry.ts"></script>
  <style>
    body { margin: 0; background: #fff; }
    #a4-page { position: relative; }
    /* Override @media print from style.css — we handle PDF export via Playwright */
    @media print {
      body * { visibility: visible !important; }
      .a4-wrapper, .a4-wrapper * { visibility: visible !important; }
      .a4-page { position: relative !important; transform: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>
  <div id="a4-page" class="a4-page">
    <div id="a4-content" class="a4-content"></div>
  </div>
</body>
</html>
